# Netlify Configuration for Scalvora Masterpiece
[build]
  publish = "."

# Optimized Headers for Static Deployment
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=0, must-revalidate"

# Handling common redirects if needed
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
